# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

on:
  workflow_call:
    inputs:
      extensions:
        required: true
        type: string
      ini-values:
        required: true
        type: string
      coverage:
        required: true
        type: string
      composer-options:
        required: true
        type: string
      test-name:
        required: true
        type: string
      min-msi:
        required: true
        type: number
      min-covered-msi:
        required: true
        type: number
      skip-phpunit:
        required: true
        type: boolean
      skip-vitest:
        required: true
        type: boolean
      skip-stryker:
        required: true
        type: boolean
      upload-codecov:
        required: true
        type: boolean
      upload-codeclimate:
        required: true
        type: boolean
      upload-coveralls:
        required: true
        type: boolean
      upload-flag:
        required: true
        type: string
      skip-nasm-install:
        required: true
        type: boolean
      skip-libimagequant-install:
        required: true
        type: boolean
      skip-libpng-install:
        required: true
        type: boolean
      skip-librabbitmq-install:
        required: true
        type: boolean
      skip-libgif-install:
        required: true
        type: boolean
      use-phpstan:
        required: true
        type: boolean
      skip-infection:
        required: false
        type: boolean
        default: false
    secrets:
      ENV_CODECLIMATE_API_KEY:
        required: true
      ENV_CODECOV_TOKEN:
        required: true
      ENV_STRYKER_DASHBOARD_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  phpunit:
    name: "UnitTests with PHPUnit"

    runs-on: "${{ matrix.operating-system }}"

    timeout-minutes: 40

    continue-on-error: ${{ '8.5' == matrix.php-version || '8.6' == matrix.php-version }}

    if: inputs.skip-phpunit == false

    strategy:
      fail-fast: false

      matrix:
        operating-system:
          - "ubuntu-latest"

        php-version:
          - "8.5"

        dependencies:
          - "lowest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          lfs: false
          persist-credentials: false

      - name: "install librabbitmq-dev"
        run: "sudo apt-get install librabbitmq-dev -y"
        if: inputs.skip-librabbitmq-install == false

      - name: "install libgif-dev"
        run: "sudo apt-get install libgif-dev"
        if: inputs.skip-libgif-install == false

      - name: "Install PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          php-version: "${{ matrix.php-version }}"
          extensions: "none, phar, json, opcache, curl, iconv, mbstring, ${{ inputs.extensions }}"
          ini-values: "${{ inputs.ini-values }}"
          coverage: "none"
          tools: "composer:v2"
        env:
          fail-fast: true
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          phpts: "nts"
          debug: true

      - name: "Update dependencies with composer"
        uses: "ramsey/composer-install@4.0.0"
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"

      - name: "Run unit tests with phpunit/phpunit${{ inputs.test-name }}"
        run: "vendor/bin/phpunit -c phpunit.xml --no-coverage --display-warnings --display-deprecations"

  phpunit-code-coverage:
    name: "Code Coverage with PHPUnit"

    runs-on: "${{ matrix.operating-system }}"

    timeout-minutes: 120

    continue-on-error: ${{ '8.5' == matrix.php-version || '8.6' == matrix.php-version }}

    if: inputs.skip-phpunit == false

    strategy:
      fail-fast: false

      matrix:
        operating-system:
          - "ubuntu-latest"

        php-version:
          - "8.5"

        dependencies:
          - "lowest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          lfs: false
          persist-credentials: false

      - name: "install librabbitmq-dev"
        run: "sudo apt-get install librabbitmq-dev -y"
        if: inputs.skip-librabbitmq-install == false

      - name: "install libgif-dev"
        run: "sudo apt-get install libgif-dev"
        if: inputs.skip-libgif-install == false

      - name: "Install PHP"
        uses: "shivammathur/setup-php@2.37.0"
        with:
          php-version: "${{ matrix.php-version }}"
          extensions: "none, phar, json, opcache, curl, iconv, mbstring, ${{ inputs.extensions }}"
          ini-values: "${{ inputs.ini-values }}"
          coverage: "${{ inputs.coverage }}"
          tools: "composer:v2"
        env:
          fail-fast: true
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          phpts: "nts"
          debug: true

      - name: "Update dependencies with composer"
        uses: "ramsey/composer-install@4.0.0"
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"

      - name: "Create cache directory for phpunit/phpunit"
        run: "mkdir -p .build/coverage"

      - name: "Collect code coverage with Xdebug and phpunit/phpunit${{ inputs.test-name }}"
        run: "vendor/bin/phpunit -c phpunit.xml --coverage-clover=.build/coverage/clover.xml --coverage-text --coverage-xml=.build/coverage/coverage-xml --log-junit=.build/coverage/phpunit.junit.xml --display-warnings --display-deprecations"

      - name: "Upload coverage to Codecov"
        uses: "codecov/codecov-action@v5.5.2"
        if: inputs.upload-codecov == true
        with:
          files: ".build/coverage/clover.xml"
          flags: "phpunit,php-${{ matrix.php-version }},${{ matrix.operating-system }},${{ inputs.upload-flag }}"
          verbose: false
          disable_search: true
          disable_file_fixes: true
        env:
          CODECOV_TOKEN: "${{ secrets.ENV_CODECOV_TOKEN }}"

      - name: "Upload test results to Codecov"
        if: ${{ inputs.upload-codecov == true && !cancelled() }}
        continue-on-error: true
        uses: "codecov/test-results-action@v1"
        with:
          files: ".build/coverage/phpunit.junit.xml"
          flags: "phpunit,php-${{ matrix.php-version }},${{ matrix.operating-system }},${{ inputs.upload-flag }}"
          verbose: false
          disable_search: true
        env:
          CODECOV_TOKEN: "${{ secrets.ENV_CODECOV_TOKEN }}"

      - name: "Upload coverage to Codeclimate"
        uses: "paambaati/codeclimate-action@v9.0.0"
        if: inputs.upload-codeclimate == true
        continue-on-error: true
        env:
          CC_TEST_REPORTER_ID: "${{ secrets.ENV_CODECLIMATE_API_KEY }}"
        with:
          coverageLocations: ".build/coverage/clover.xml:clover"
          debug: false

      - name: "Upload coverage to Coveralls"
        uses: "coverallsapp/github-action@v2"
        if: inputs.upload-coveralls == true
        continue-on-error: true
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          flag-name: "php ${{ matrix.php-version }} on ${{ matrix.operating-system }}"
          parallel: true
          file: ".build/coverage/clover.xml"
          format: "clover"
          debug: false

      - name: "Run mutation tests with infection/infection without PHPStan"
        timeout-minutes: 90
        if: ${{ inputs.skip-infection == false && inputs.use-phpstan == false }}
        continue-on-error: true
        env:
          STRYKER_DASHBOARD_API_KEY: "${{ secrets.ENV_STRYKER_DASHBOARD_API_KEY }}"
        run: "vendor/bin/infection --show-mutations --min-covered-msi=${{ inputs.min-covered-msi }} --min-msi=${{ inputs.min-msi }} --coverage=.build/coverage --logger-github --no-progress --show-mutations=max -vv"

      - name: "Run mutation tests with infection/infection with PHPStan"
        timeout-minutes: 90
        if: ${{ inputs.skip-infection == false && inputs.use-phpstan == true }}
        continue-on-error: true
        env:
          STRYKER_DASHBOARD_API_KEY: "${{ secrets.ENV_STRYKER_DASHBOARD_API_KEY }}"
        run: "vendor/bin/infection --show-mutations --min-covered-msi=${{ inputs.min-covered-msi }} --min-msi=${{ inputs.min-msi }} --coverage=.build/coverage --logger-github --no-progress --show-mutations=max -vv --static-analysis-tool=phpstan --static-analysis-tool-options=\"--configuration=phpstan.neon --memory-limit=768M --no-progress\""

  finish-code-coverage:
    runs-on: "ubuntu-latest"

    needs: "phpunit-code-coverage"

    if: inputs.upload-coveralls == true

    steps:
      - name: "Coveralls Finished"
        uses: "coverallsapp/github-action@v2"
        continue-on-error: true
        with:
          parallel-finished: true

  # This is a meta job to avoid to have to constantly change the protection rules
  # whenever we touch the matrix.
  tests-status:
    name: "Unit & Integration Tests Status"

    runs-on: "ubuntu-latest"

    if: always()

    needs:
      - "phpunit"
      - "phpunit-code-coverage"

    steps:
      - name: Failing run
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

      - name: Successful run
        if: ${{ !(contains(needs.*.result, 'failure')) && !(contains(needs.*.result, 'skipped')) && !(contains(needs.*.result, 'cancelled')) }}
        run: exit 0
